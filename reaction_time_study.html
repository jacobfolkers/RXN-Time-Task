<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Time Study & Results</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #welcome-screen, #end-screen { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center;
        }
        #canvas { display: none; background-color: #f8f9fa; cursor: crosshair; }
        .hidden { display: none !important; }
        .chart-container { width: 80%; max-width: 800px; margin-top: 20px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        input { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1>Reaction Time Task</h1>
        <p>Click the red circle as fast as you can. 10 trials total.</p>
        <input type="text" id="participant-id" placeholder="Enter Participant ID">
        <button id="start-btn">Start Task</button>
    </div>

    <canvas id="canvas"></canvas>

    <div id="end-screen" class="hidden">
        <h2>Task Complete!</h2>
        <p id="user-stats"></p>
        <div class="chart-container">
            <canvas id="statsChart"></canvas>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyDQft2ZaQxSZMBAo91KosZcW5b0KTgUwvjAyKc6E0N_PtuHqEZJaIYLYM2M5c0uwcl/exec";
        
        const welcomeScreen = document.getElementById('welcome-screen');
        const endScreen = document.getElementById('end-screen');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');

        let participantId = "";
        let trials = [];
        const maxTrials = 10;
        let startTime;
        let circle = { x: 0, y: 0, r: 40 };

        startBtn.addEventListener('click', () => {
            const inputId = document.getElementById('participant-id').value.trim();
            participantId = inputId || "USER-" + Math.random().toString(36).substring(2, 7).toUpperCase();
            welcomeScreen.classList.add('hidden');
            canvas.style.display = 'block';
            resizeCanvas();
            nextTrial();
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function nextTrial() {
            if (trials.length >= maxTrials) {
                finishExperiment();
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            setTimeout(() => {
                circle.x = Math.random() * (canvas.width - circle.r * 2) + circle.r;
                circle.y = Math.random() * (canvas.height - circle.r * 2) + circle.r;
                drawCircle();
            }, 600);
        }

        function drawCircle() {
            ctx.beginPath();
            ctx.arc(circle.x, circle.y, circle.r, 0, Math.PI * 2);
            ctx.fillStyle = "#e74c3c";
            ctx.fill();
            ctx.closePath();
            startTime = performance.now();
        }

        canvas.addEventListener('mousedown', (e) => {
            const dist = Math.sqrt((e.clientX - circle.x)**2 + (e.clientY - circle.y)**2);
            if (dist < circle.r) {
                const rt = Math.round(performance.now() - startTime);
                trials.push(rt);
                submitTrial(participantId, trials.length, rt);
                nextTrial();
            }
        });

        async function submitTrial(id, trialNum, rt) {
            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ Participant_ID: id, Trial_Number: trialNum, Reaction_Time: rt })
                });
            } catch (e) { console.error("Error saving trial", e); }
        }

        async function finishExperiment() {
            canvas.style.display = 'none';
            endScreen.classList.remove('hidden');
            
            const userAvg = trials.reduce((a, b) => a + b, 0) / trials.length;
            document.getElementById('user-stats').innerText = `Your Average RT: ${userAvg.toFixed(2)}ms`;

            // Fetch historical data
            try {
                const response = await fetch(WEB_APP_URL);
                const historicalData = await response.json();
                generateHistogram(historicalData, userAvg);
            } catch (e) {
                console.error("Error fetching history", e);
                document.getElementById('user-stats').innerText += " (Could not load comparison data)";
            }
        }

        function generateHistogram(data, userAvg) {
            const ctxChart = document.getElementById('statsChart').getContext('2d');
            
            new Chart(ctxChart, {
                type: 'bar',
                data: {
                    datasets: [{
                        label: 'Historical RT Distribution',
                        data: data, // Chart.js handles raw arrays for basic histograms/distribution in some versions, 
                        // but here we map them to bins for a standard bar look
                        backgroundColor: 'rgba(54, 162, 235, 0.5)',
                    }]
                },
                options: {
                    scales: {
                        x: { title: { display: true, text: 'Reaction Time (ms)' } },
                        y: { title: { display: true, text: 'Frequency' } }
                    },
                    plugins: {
                        annotation: { // Optional: Requires annotation plugin, or use a workaround:
                            annotations: {
                                line1: {
                                    type: 'line',
                                    xMin: userAvg,
                                    xMax: userAvg,
                                    borderColor: 'rgb(255, 99, 132)',
                                    borderWidth: 4,
                                    label: { content: 'YOU', enabled: true }
                                }
                            }
                        }
                    }
                }
            });
            
            // Simplified Histogram Logic: Grouping data into 50ms bins
            const bins = {};
            data.forEach(val => {
                const bin = Math.floor(val / 50) * 50;
                bins[bin] = (bins[bin] || 0) + 1;
            });

            const labels = Object.keys(bins).sort((a, b) => a - b);
            const counts = labels.map(l => bins[l]);

            new Chart(ctxChart, {
                type: 'bar',
                data: {
                    labels: labels.map(l => `${l}ms`),
                    datasets: [{
                        label: 'All Participants',
                        data: counts,
                        backgroundColor: '#3498db'
                    }]
                },
                options: {
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: true }
                    }
                }
            });
        }

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
